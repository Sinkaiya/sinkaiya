{% extends 'blogapp/base.html' %}

{% block title %}
    Заметки по случаю: {{ post.title }}
{% endblock %}

{% block staticcss %}
{% endblock %}

{% block content %}
    <div class="articletext">
        <h2>
            {{ post.title }}
        </h2>
        <p>
            {{ post.text|linebreaksbr }}
        </p>
        {% if post.created_date %}
            <div class="grey">
                {{ post.created_date }}
            </div>
        {% endif %}
    </div>
{% endblock %}
