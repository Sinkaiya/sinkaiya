{% extends 'blogapp/base.html' %}

{% block content %}
    {% for post in posts %}
        <div class="post">
            <h2><a href="{% url 'post_detail' pk=post.pk %}">{{ post.title }}</a></h2>
            <p>{{ post.text|linebreaksbr|slice:':600' }}...</p>
            <div class="grey">
                {{ post.created_date }}
            </div>
        </div>
    {% endfor %}
{% endblock %}
